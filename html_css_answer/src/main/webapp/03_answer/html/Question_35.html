<!DOCTYPE html>
<html>
	<head>
		<title>CSSの演習課題</title>
		<meta charset="UTF-8">
		<style>
			p {
				color:#0000ff;
			}
	
			p.f_large{
				font-size:20px;
			}

			p.f_small{
				font-size:10px;
			}
		</style>
	</head>
	<body>
		<p class="f_large">CSSはウェブページのスタイルを指定するための言語です。</p>
		<p class="f_small">CSSはHTMLと組み合わせて使用します。
	</body>
</html>
