<!DOCTYPE html>
<html>
	<head>
		<title>CSSの演習課題</title>
		<meta charset="UTF-8">
		<style>
			.wrapper{
				background-color: #00FF00;
			}

			.marker{
				background-color: #00FFFF;
			}
		</style>
	</head>
	<body>
		<div class="wrapper">
			<p>タグは大きく分類すると<span class="marker">ブロック要素とインライン要素</span>の2種類に分けられます。</p>
		</div>
	</body>
</html>
